name: CI — Validate PR

on:
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
